<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Orange Clock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    #app {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      background: linear-gradient(145deg, #1a0800, #0d0400);
      border: 2px solid #ff6600;
      border-radius: 14px;
      box-shadow:
        0 0 24px rgba(255, 100, 0, 0.4),
        0 0 60px rgba(255, 60, 0, 0.15),
        inset 0 0 30px rgba(255, 50, 0, 0.05);
      -webkit-app-region: no-drag;
      user-select: none;
    }

    /* ── Clock panel ── */
    #clock-panel {
      width: 460px;
      padding: 22px 32px 18px;
      flex-shrink: 0;
    }

    #time-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      line-height: 1;
    }

    #time {
      font-size: 72px;
      font-weight: bold;
      letter-spacing: 4px;
      color: #ff8800;
      text-shadow:
        0 0 8px #ff6600,
        0 0 20px rgba(255, 100, 0, 0.7),
        0 0 40px rgba(255, 60, 0, 0.3);
    }

    .colon { animation: blink 1s step-start infinite; }

    @keyframes blink { 50% { opacity: 0.2; } }

    #ampm {
      font-size: 22px;
      font-weight: bold;
      color: #ff6600;
      text-shadow: 0 0 8px #ff4400;
      margin-left: 8px;
      letter-spacing: 1px;
      align-self: flex-end;
      padding-bottom: 10px;
    }

    #divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255, 100, 0, 0.5), transparent);
      margin: 10px 0 8px;
    }

    #bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #date {
      font-size: 15px;
      letter-spacing: 2px;
      color: #ffaa55;
      text-shadow: 0 0 6px rgba(255, 100, 0, 0.6);
      text-transform: uppercase;
    }

    #mode-buttons {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .mode-btn {
      background: none;
      border: 1px solid rgba(255, 100, 0, 0.3);
      border-radius: 6px;
      color: rgba(255, 130, 0, 0.5);
      font-size: 15px;
      cursor: pointer;
      padding: 2px 6px;
      -webkit-app-region: no-drag;
      transition: color 0.2s, border-color 0.2s;
      line-height: 1.4;
    }

    .mode-btn:hover, .mode-btn.active {
      color: #ff8800;
      border-color: rgba(255, 100, 0, 0.7);
    }

    /* ── Panel divider ── */
    #panel-divider {
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(255, 100, 0, 0.5), transparent);
      margin: 16px 0;
      flex-shrink: 0;
    }

    #panel-divider.hidden,
    #right-panel.hidden {
      display: none;
    }

    /* ── Right panel ── */
    #right-panel {
      width: 400px;
      padding: 22px 28px 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .tool-display {
      font-size: 52px;
      font-weight: bold;
      color: #ff8800;
      letter-spacing: 3px;
      text-shadow:
        0 0 8px #ff6600,
        0 0 20px rgba(255, 100, 0, 0.7);
    }

    .tool-controls {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .ctrl-btn {
      background: none;
      border: 1px solid rgba(255, 100, 0, 0.4);
      border-radius: 8px;
      color: #ff8800;
      font-size: 13px;
      cursor: pointer;
      padding: 5px 16px;
      font-family: 'Consolas', 'Courier New', monospace;
      letter-spacing: 1px;
      -webkit-app-region: no-drag;
      transition: color 0.2s, border-color 0.2s, text-shadow 0.2s;
    }

    .ctrl-btn:hover {
      color: #ffaa44;
      border-color: rgba(255, 100, 0, 0.8);
      text-shadow: 0 0 8px rgba(255, 100, 0, 0.5);
    }

    /* ── Timer inputs ── */
    #tm-inputs {
      display: flex;
      align-items: center;
      gap: 4px;
      color: rgba(255, 100, 0, 0.6);
      font-size: 14px;
      letter-spacing: 1px;
    }

    #tm-min, #tm-sec {
      width: 40px;
      background: rgba(255, 100, 0, 0.08);
      border: 1px solid rgba(255, 100, 0, 0.3);
      border-radius: 4px;
      color: #ff8800;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      text-align: center;
      padding: 3px 2px;
      -webkit-app-region: no-drag;
      outline: none;
    }

    #tm-min:focus, #tm-sec:focus {
      border-color: rgba(255, 100, 0, 0.7);
    }

    #tm-min:disabled, #tm-sec:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #tm-panel.hidden,
    #sw-panel.hidden {
      display: none;
    }

    /* ── Close button ── */
    #close-btn {
      position: fixed;
      top: 10px;
      right: 18px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      color: rgba(255, 100, 0, 0.5);
      -webkit-app-region: no-drag;
      transition: color 0.2s;
      line-height: 1;
    }

    #close-btn:hover { color: #ff4400; }
  </style>
</head>
<body>
  <button id="close-btn" onclick="window.close()">✕</button>
  <div id="app">

    <div id="clock-panel">
      <div id="time-row">
        <span id="time">
          <span id="hours">12</span><span class="colon">:</span><span id="minutes">00</span><span class="colon">:</span><span id="seconds">00</span>
        </span>
        <span id="ampm">AM</span>
      </div>
      <div id="divider"></div>
      <div id="bottom-row">
        <div id="date">Tuesday, May 13, 2026</div>
        <div id="mode-buttons">
          <button id="btn-stopwatch" class="mode-btn" title="Stopwatch">⏱</button>
          <button id="btn-timer" class="mode-btn" title="Timer">⏲</button>
        </div>
      </div>
    </div>

    <div id="panel-divider" class="hidden"></div>

    <div id="right-panel" class="hidden">
      <div id="sw-panel">
        <div id="sw-display" class="tool-display">00:00.00</div>
        <div class="tool-controls">
          <button id="sw-toggle" class="ctrl-btn">Start</button>
          <button id="sw-reset" class="ctrl-btn">Reset</button>
        </div>
      </div>
      <div id="tm-panel" class="hidden">
        <div id="tm-inputs">
          <input id="tm-min" type="number" min="0" max="99" value="5">
          <span>:</span>
          <input id="tm-sec" type="number" min="0" max="59" value="0">
        </div>
        <div id="tm-display" class="tool-display">05:00</div>
        <div class="tool-controls">
          <button id="tm-toggle" class="ctrl-btn">Start</button>
          <button id="tm-reset" class="ctrl-btn">Reset</button>
        </div>
      </div>
    </div>

  </div>
  <script src="renderer.js"></script>
</body>
</html>
